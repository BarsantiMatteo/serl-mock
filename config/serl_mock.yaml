# ===================================================
# SERL Mock Data - General Configuration
# ===================================================

# -------------------------
# Global
# -------------------------
n_households: 100
seed: 42
edition: "08"

# -------------------------
# Time period for smart-meter data
# -------------------------
start_year: 2019
end_year: 2019

# -------------------------
# Household profiles
# Each PUPRN is assigned baseline consumption parameters drawn once at
# initialisation.  Adjust these to shift the typical energy level of
# the synthetic population.
# -------------------------
profiles:
  base_elec_mean_wh: 175      # Mean baseline electricity per HH period (Wh)
  base_elec_std_wh:   50      # Std of per-household baseline electricity
  base_gas_mean_wh: 1500      # Mean baseline gas at peak heating demand (Wh)
  base_gas_std_wh:   300      # Std of per-household baseline gas
  gas_fraction:     0.85      # Fraction of households with a gas meter

# -------------------------
# Generation patterns
# Controls the shape of seasonal and intraday curves and noise behaviour.
# To replace a curve, edit patterns.py and leave these params unchanged,
# or adjust the amplitude/probability values here.
# -------------------------
patterns:
  elec_seasonal_amplitude:     0.3   # ±30% swing around annual mean electricity
  gas_seasonal_amplitude:      2.0   # Winter gas heating multiplier (0 in summer)
  elec_spike_probability:     0.02   # Per-reading probability of an appliance spike
  elec_spike_max_wh:        2000.0   # Maximum additional Wh added by a spike
  summer_hot_water_probability: 0.15  # Chance of non-zero gas outside heating season
  gas_heating_threshold:       0.1   # gas_seasonal multiplier below which is "summer"

# -------------------------
# Weather data (CDS / ERA5)
# Download real hourly ERA5 reanalysis data via the Copernicus Climate Data
# Store API (https://cds.climate.copernicus.eu/how-to-api).
# Credentials must be configured in ~/.cdsapirc or via environment variables
# CDSAPI_URL and CDSAPI_KEY before running the downloader.
# -------------------------
weather:
  # CDS dataset identifier
  dataset: "reanalysis-era5-single-levels"

  # ERA5 product type
  product_type: "reanalysis"

  # Variables to retrieve — aligned with the SERL climate data schema
  variables:
    - "2m_temperature"
    - "surface_solar_radiation_downwards"
    - "total_precipitation"
    - "10m_u_component_of_wind"
    - "10m_v_component_of_wind"

  # Bounding box [north, west, south, east] in decimal degrees
  # Default covers Great Britain and Northern Ireland
  area:
    - 60.0   # north
    - -8.0   # west
    - 49.0   # south
    -  2.0   # east

  # Spatial resolution in degrees [lat_step, lon_step]
  grid:
    - 0.25
    - 0.25

  # Temporal resolution: download one record per hour
  time_step_hours: 1

  # Output file format: "netcdf" (.nc) or "grib" (.grib)
  output_format: "netcdf"

  # Date range for downloads — defaults to top-level start_year / end_year
  # if omitted.  Override here to download a different period than the
  # smart-meter simulation window.
  # start_year: 2019
  # end_year:   2019

  # Output directory (relative to project root).
  # Defaults to data/mock/serl_climate_data_edition08/
  # output_dir: "data/mock/serl_climate_data_edition08"